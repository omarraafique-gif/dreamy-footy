<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Commentary Audio Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; width: 400px; font-family: monospace; padding: 10px; }
  h3 { color: #00E676; font-size: 13px; margin-bottom: 8px; letter-spacing: 1px; }
  #activate-btn {
    width: 100%; padding: 14px;
    background: #00E676; color: #000;
    border: none; font-size: 15px; font-weight: 900;
    cursor: pointer; border-radius: 6px;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  #test-btn {
    width: 100%; padding: 10px;
    background: #F0C040; color: #000;
    border: none; font-size: 13px; font-weight: 900;
    cursor: pointer; border-radius: 6px;
    display: none; margin-bottom: 8px;
  }
  #voice-select {
    width: 100%; padding: 8px;
    background: #222; color: #fff;
    border: 1px solid #333; border-radius: 4px;
    font-size: 12px; margin-bottom: 8px;
    display: none;
  }
  #status {
    color: #00E676; font-size: 11px;
    padding: 6px; background: #222;
    border-radius: 4px; margin-bottom: 8px;
  }
  #log {
    color: #7B8299; font-size: 10px;
    padding: 6px; background: #0a0a0a;
    border-radius: 4px; height: 100px;
    overflow-y: auto; line-height: 1.6;
  }
</style>
</head>
<body>
<h3>🎙️ DREAMY FOOTY — AUDIO PLAYER</h3>
<button id="activate-btn">🔊 CLICK TO ACTIVATE AUDIO</button>
<select id="voice-select"></select>
<button id="test-btn">🎙️ TEST COMMENTARY VOICE</button>
<div id="status">⏳ Click activate to start</div>
<div id="log">Waiting for events...</div>

<script>
  var synth       = window.speechSynthesis;
  var queue       = [];
  var isPlaying   = false;
  var activated   = false;
  var selectedVoice = null;
  var lastTimestamp = null;

  var activateBtn  = document.getElementById('activate-btn');
  var testBtn      = document.getElementById('test-btn');
  var voiceSelect  = document.getElementById('voice-select');
  var statusEl     = document.getElementById('status');
  var logEl        = document.getElementById('log');

  function setStatus(msg) { statusEl.textContent = msg; }
  function addLog(msg) {
    var line = document.createElement('div');
    line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // ── LOAD VOICES ──────────────────────────
  function loadVoices() {
    var voices = synth.getVoices();
    voiceSelect.innerHTML = '';
    var englishVoices = voices.filter(function(v) {
      return v.lang.indexOf('en') !== -1;
    });
    // If no English voices found show all
    var list = englishVoices.length > 0 ? englishVoices : voices;
    list.forEach(function(v, i) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = v.name + ' (' + v.lang + ')';
      // Prefer male voices for sports commentary
      if (v.name.toLowerCase().indexOf('male') !== -1 ||
          v.name.toLowerCase().indexOf('david') !== -1 ||
          v.name.toLowerCase().indexOf('mark') !== -1 ||
          v.name.toLowerCase().indexOf('james') !== -1) {
        opt.selected = true;
      }
      voiceSelect.appendChild(opt);
    });
    if (list.length > 0) selectedVoice = list[0];
    addLog('Loaded ' + list.length + ' English voices');
  }

  // Voices load async in Chrome
  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = loadVoices;
  }
  loadVoices();

  // ── ACTIVATE ─────────────────────────────
  activateBtn.onclick = function() {
    activated = true;
    activateBtn.style.display = 'none';
    voiceSelect.style.display = 'block';
    testBtn.style.display = 'block';
    setStatus('✅ Audio activated — listening for events!');
    addLog('Audio activated successfully');
    // Reload voices after activation
    loadVoices();
  };

  // Voice selection change
  voiceSelect.onchange = function() {
    var voices = synth.getVoices().filter(function(v) {
      return v.lang.indexOf('en') !== -1;
    });
    selectedVoice = voices[parseInt(voiceSelect.value)];
    addLog('Voice changed to: ' + (selectedVoice ? selectedVoice.name : 'default'));
  };

  // ── SPEAK ────────────────────────────────
  function speak(text) {
    queue.push(text);
    addLog('Queued: ' + text.substring(0, 50) + '...');
    if (!isPlaying) processQueue();
  }

  function processQueue() {
    if (queue.length === 0) {
      isPlaying = false;
      setStatus('✅ Ready — listening for events...');
      return;
    }
    isPlaying = true;
    var text = queue.shift();
    setStatus('🔊 Speaking...');

    synth.cancel();
    var utt = new SpeechSynthesisUtterance(text);
    utt.rate   = 1.05;
    utt.pitch  = 1.0;
    utt.volume = 1.0;

    // Use selected voice
    var voices = synth.getVoices();
    var engVoices = voices.filter(function(v) { return v.lang.indexOf('en') !== -1; });
    if (engVoices.length > 0) {
      var idx = parseInt(voiceSelect.value) || 0;
      utt.voice = engVoices[idx] || engVoices[0];
    }

    utt.onend = function() {
      addLog('Done speaking');
      isPlaying = false;
      setTimeout(processQueue, 500);
    };
    utt.onerror = function(e) {
      addLog('Speech error: ' + e.error);
      isPlaying = false;
      setTimeout(processQueue, 500);
    };

    synth.speak(utt);
    addLog('Speaking: ' + text.substring(0, 40) + '...');
  }

  // ── TEST BUTTON ──────────────────────────
  testBtn.onclick = function() {
    speak('GOAL! Mbappe scores for France in the 34th minute! What an absolute rocket! The crowd goes absolutely wild!');
  };

  // ── POLL LOCALSTORAGE FOR EVENTS ─────────
  setInterval(function() {
    var raw = localStorage.getItem('commentary_event');
    if (raw) {
      try {
        var data = JSON.parse(raw);
        if (data.timestamp && data.timestamp !== lastTimestamp) {
          lastTimestamp = data.timestamp;
          localStorage.removeItem('commentary_event');
          if (data.text && activated) {
            speak(data.text);
          }
        }
      } catch(e) {}
    }
  }, 500);

  addLog('Audio player ready!');
</script>
</body>
</html>
